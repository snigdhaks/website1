services:
  rotaract-website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_STRAPI_API_URL=${VITE_STRAPI_API_URL}
        - VITE_STRAPI_TOKEN=${VITE_STRAPI_TOKEN}
    container_name: rotaract-mec-website
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - rotaract-strapi
    networks:
      - rotaract-network

  rotaract-strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rotaract-mec-strapi
    ports:
      - "1337:1337"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - strapi_uploads:/app/public/uploads
      - strapi_data:/app/.tmp
    restart: unless-stopped
    networks:
      - rotaract-network

networks:
  rotaract-network:
    driver: bridge

volumes:
  strapi_uploads:
  strapi_data:
